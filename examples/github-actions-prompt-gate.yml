# Example GitHub Actions workflow: regression-gate every prompt change with Cassandra.
#
# Put your system prompt in prompts/system_prompt.txt and your eval dataset in
# evals/cases.json (the same {input_text, expected_answer, acceptance_criterion}
# shape Cassandra's Synthesizer emits, so production incidents become CI suites).
# The job fails when the pass rate drops below the threshold, blocking the PR
# exactly like a failing unit test.

name: prompt-gate
on:
  pull_request:
    paths:
      - "prompts/**"
      - "evals/**"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "cassandra @ git+https://github.com/SirjanSingh/cassandra"
      - name: Gate the prompt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}        # judge backend
          PATIENT_ENDPOINT: ${{ secrets.STAGING_AGENT_URL }}    # your agent's /chat
          REPLAY_SHARED_SECRET: ${{ secrets.REPLAY_SHARED_SECRET }}
        run: |
          cassandra-gate \
            --prompt-file prompts/system_prompt.txt \
            --cases evals/cases.json \
            --threshold 0.8
