# Builds the shared image and deploys Patient + Dashboard to Cloud Run.
# Cassandra itself deploys to Vertex AI Agent Engine via deploy/agent_engine.py
# (Cloud Run is the documented fallback for Cassandra, risk R2).
#
# Prerequisites (one-time; see docs/DEPLOYMENT.md for the full checklist):
#   gcloud services enable run.googleapis.com cloudbuild.googleapis.com \
#     artifactregistry.googleapis.com secretmanager.googleapis.com firestore.googleapis.com
#   gcloud artifacts repositories create cassandra --repository-format=docker --location=$_REGION
#   gcloud secrets create phoenix-api-key      --data-file=-   # Arize Cloud Phoenix key
#   gcloud secrets create openai-api-key       --data-file=-   # LLM backend
#   gcloud secrets create replay-shared-secret --data-file=-   # any random string
#   (grant the Cloud Run runtime SA roles/secretmanager.secretAccessor + roles/datastore.user)
substitutions:
  _REGION: us-central1
  _REPO: cassandra
  # Public URL of the deployed Patient service (set after first deploy), e.g.
  # https://patient-xxxxx-uc.a.run.app/chat — the dashboard's pipeline drives it.
  _PATIENT_URL: http://localhost:8082/chat
  # A reachable Phoenix instance (Arize Cloud space or self-hosted with a public URL).
  # A localhost Phoenix CANNOT work from Cloud Run.
  _PHOENIX_BASE_URL: https://app.phoenix.arize.com

steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "deploy/cloudrun.Dockerfile",
           "-t", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:$SHORT_SHA", "."]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:$SHORT_SHA"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: ["run", "deploy", "patient",
           "--image", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:$SHORT_SHA",
           "--region", "${_REGION}",
           "--set-env-vars",
           "SERVICE=patient,PHOENIX_BASE_URL=${_PHOENIX_BASE_URL},GOOGLE_GENAI_USE_VERTEXAI=false",
           "--update-secrets",
           "PHOENIX_API_KEY=phoenix-api-key:latest,OPENAI_API_KEY=openai-api-key:latest,REPLAY_SHARED_SECRET=replay-shared-secret:latest",
           "--allow-unauthenticated"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: ["run", "deploy", "dashboard",
           "--image", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:$SHORT_SHA",
           "--region", "${_REGION}",
           "--set-env-vars",
           "SERVICE=dashboard,PATIENT_ENDPOINT=${_PATIENT_URL},PHOENIX_BASE_URL=${_PHOENIX_BASE_URL},GOOGLE_GENAI_USE_VERTEXAI=false,STATE_BACKEND=firestore",
           "--update-secrets",
           "PHOENIX_API_KEY=phoenix-api-key:latest,OPENAI_API_KEY=openai-api-key:latest,REPLAY_SHARED_SECRET=replay-shared-secret:latest",
           "--allow-unauthenticated"]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:$SHORT_SHA"
